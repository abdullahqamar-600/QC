<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QC Appraisal — Pipeline</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="tokens.css">
<link rel="stylesheet" href="components.css">
<style>
/* ── SHELL (V1 — top nav) ── */
html, body { height: 100%; }
body {
  background: var(--surface-page);
  min-width: 1024px;
  display: flex; flex-direction: column;
  overflow: hidden;
  color: var(--color-neutral-900);
  font-family: var(--font-family-base);
}

.topbar {
  position: sticky; top: 0; z-index: var(--z-sticky);
  flex-shrink: 0; height: 56px; padding: 0 var(--space-8); gap: var(--space-4);
  background: var(--color-white);
  border-bottom: 1px solid var(--border-color);
  display: flex; align-items: stretch;
}
.topbar-logo { display: flex; align-items: center; gap: var(--space-2); font-size: var(--font-size-md); font-weight: var(--font-weight-semibold); color: var(--color-neutral-900); text-decoration: none; }
.topbar-logo-icon { width: 26px; height: 26px; border-radius: var(--border-radius-md); background: var(--color-neutral-900); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.topbar-nav { display: flex; align-items: stretch; margin-left: var(--space-6); gap: 0; }
.topbar-nav-item {
  display: flex; align-items: center;
  padding: 0 var(--space-4);
  font-size: var(--font-size-sm); font-weight: var(--font-weight-medium);
  color: var(--color-neutral-500);
  text-decoration: none;
  border-bottom: 2px solid transparent;
  transition: color var(--transition-fast), border-color var(--transition-fast);
  white-space: nowrap;
  position: relative; top: 1px;
}
.topbar-nav-item:hover { color: var(--color-neutral-900); }
.topbar-nav-item.active {
  color: var(--color-brand-600);
  font-weight: var(--font-weight-semibold);
  border-bottom-color: var(--color-brand-600);
}
.topbar-right { margin-left: auto; display: flex; align-items: center; gap: var(--space-5); }
.user-avatar { width: 28px; height: 28px; border-radius: var(--border-radius-pill); background: var(--color-brand-100); display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: var(--font-weight-semibold); color: var(--color-brand-600); border: 1px solid var(--border-color); }

/* ── PAGE ── */
.page-wrap {
  flex: 1; overflow: hidden;
  padding: var(--space-5) var(--space-8) var(--space-5);
  display: flex; flex-direction: column; gap: var(--space-4);
  min-height: 0;
}
.page-header {
  display: flex; align-items: center; gap: var(--space-4);
  flex-shrink: 0;
}
.page-title {
  font-size: var(--font-size-2xl); font-weight: var(--font-weight-bold);
  letter-spacing: -0.02em; line-height: 1.1; color: var(--color-neutral-900); margin: 0;
}
.page-subtitle {
  font-size: var(--font-size-sm); color: var(--color-neutral-500);
}
.header-spacer { flex: 1; }

.date-filter { display: flex; gap: 2px; background: var(--color-neutral-100); border-radius: var(--border-radius-md); padding: 3px; border: 1px solid var(--border-color); }
.date-btn {
  padding: 4px var(--space-3); border-radius: var(--border-radius-sm); border: none;
  font-family: var(--font-family-base); font-size: var(--font-size-sm);
  font-weight: var(--font-weight-medium); color: var(--color-neutral-600);
  background: transparent; cursor: pointer; transition: all var(--transition-fast); white-space: nowrap;
}
.date-btn.active { background: var(--color-white); color: var(--color-neutral-900); box-shadow: var(--shadow-xs); }
.date-btn:hover:not(.active) { color: var(--color-neutral-900); }

/* ── SUMMARY STRIP ── */
.summary-strip {
  display: grid; grid-template-columns: repeat(4, 1fr);
  gap: var(--space-3); flex-shrink: 0;
}
.summary-tile {
  background: var(--color-white);
  border: 1px solid var(--border-color);
  border-radius: var(--border-radius-lg);
  padding: var(--space-3) var(--space-4);
  display: flex; flex-direction: column; gap: 2px;
}
.summary-tile-label {
  font-size: 10px; font-weight: var(--font-weight-semibold);
  color: var(--color-neutral-500); letter-spacing: 0.06em; text-transform: uppercase;
}
.summary-tile-value {
  font-size: var(--font-size-2xl); font-weight: var(--font-weight-bold);
  letter-spacing: -0.02em; color: var(--color-neutral-900); line-height: 1.1;
  font-variant-numeric: tabular-nums;
}
.summary-tile-sub { font-size: 11px; color: var(--color-neutral-500); }

/* ── KANBAN BOARD ── */
.kanban {
  display: grid;
  grid-template-columns: repeat(6, minmax(0, 1fr));
  gap: var(--space-3);
  flex: 1; min-height: 0;
}
.col {
  display: flex; flex-direction: column;
  background: var(--color-neutral-50);
  border: 1px solid var(--border-color);
  border-radius: var(--border-radius-lg);
  min-height: 0;
}
.col-head {
  padding: var(--space-3) var(--space-3);
  border-bottom: 1px solid var(--border-color);
  display: flex; flex-direction: column; gap: var(--space-2);
  flex-shrink: 0;
  background: var(--color-white);
  border-top-left-radius: var(--border-radius-lg);
  border-top-right-radius: var(--border-radius-lg);
}
.col-title-row { display: flex; align-items: center; gap: var(--space-2); }
.col-dot { width: 8px; height: 8px; border-radius: var(--border-radius-pill); flex-shrink: 0; }
.col-title { font-size: var(--font-size-sm); font-weight: var(--font-weight-semibold); color: var(--color-neutral-900); flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.col-count {
  font-family: var(--font-family-mono); font-size: 11px; font-weight: var(--font-weight-semibold);
  color: var(--color-neutral-700);
  background: var(--color-neutral-100);
  padding: 2px 8px; border-radius: var(--border-radius-pill);
}
.col-meta { display: flex; align-items: baseline; justify-content: space-between; gap: var(--space-2); }
.col-meta-label { font-size: 10px; font-weight: var(--font-weight-semibold); color: var(--color-neutral-500); letter-spacing: 0.06em; text-transform: uppercase; }
.col-meta-value { font-size: var(--font-size-sm); font-weight: var(--font-weight-semibold); color: var(--color-neutral-900); font-variant-numeric: tabular-nums; }

.col-body {
  flex: 1; overflow-y: auto;
  padding: var(--space-2);
  display: flex; flex-direction: column; gap: 6px;
}
.col-empty { padding: var(--space-4) var(--space-3); text-align: center; color: var(--color-neutral-400); font-size: var(--font-size-xs); }

.loan-card {
  background: var(--color-white);
  border: 1px solid var(--border-color);
  border-radius: var(--border-radius-md);
  padding: var(--space-2) var(--space-3);
  cursor: pointer;
  transition: border-color var(--transition-fast), box-shadow var(--transition-fast);
  display: flex; flex-direction: column; gap: 4px;
}
.loan-card:hover { border-color: var(--border-color-hover); box-shadow: var(--shadow-sm); }
.loan-card.is-blocked { border-left: 3px solid var(--color-warning-500); }
.loan-card.is-failed  { border-left: 3px solid var(--color-danger-500); background: var(--color-danger-50); }
.loan-card-top { display: flex; align-items: center; gap: var(--space-2); }
.loan-card-id { font-family: var(--font-family-mono); font-size: 11px; font-weight: var(--font-weight-semibold); color: var(--color-neutral-900); }
.loan-card-pill {
  font-size: 9px; font-weight: var(--font-weight-bold);
  padding: 1px 6px; border-radius: var(--border-radius-sm);
  letter-spacing: 0.04em; text-transform: uppercase;
  margin-left: auto;
}
.loan-card-pill.blocked { background: var(--color-warning-100); color: var(--color-warning-700); }
.loan-card-pill.failed  { background: var(--color-danger-100); color: var(--color-danger-700); }
.loan-card-progress {
  height: 4px; background: var(--color-neutral-100); border-radius: var(--border-radius-pill);
  overflow: hidden; position: relative;
}
.loan-card-progress-fill {
  position: absolute; inset: 0 auto 0 0; border-radius: var(--border-radius-pill);
  background: var(--color-info-500);
}
.loan-card-progress-fill.blocked { background: var(--color-warning-500); }
.loan-card-time {
  font-size: 10px; color: var(--color-neutral-500); font-variant-numeric: tabular-nums;
  display: flex; justify-content: space-between; gap: var(--space-2);
}

/* ── LOAN DRAWER (V1) ── */
.drawer-overlay {
  position: fixed; inset: 0;
  background: rgba(15, 23, 42, 0.4);
  backdrop-filter: blur(2px);
  opacity: 0; pointer-events: none;
  transition: opacity 200ms ease;
  z-index: 9000;
}
.drawer-overlay.is-open { opacity: 1; pointer-events: auto; }
.drawer-panel {
  position: fixed; top: 0; right: 0; bottom: 0;
  width: 540px; max-width: 92vw;
  background: var(--color-white);
  border-left: 1px solid var(--border-color);
  box-shadow: -8px 0 24px rgba(15, 23, 42, 0.08);
  transform: translateX(100%);
  transition: transform 280ms cubic-bezier(0.16, 1, 0.3, 1);
  z-index: 9100;
  display: flex; flex-direction: column;
}
.drawer-panel.is-open { transform: translateX(0); }
.drawer-header {
  display: flex; align-items: center; gap: var(--space-3);
  padding: var(--space-4) var(--space-5);
  border-bottom: 1px solid var(--border-color);
  flex-shrink: 0;
}
.drawer-id { font-size: var(--font-size-xl); font-weight: var(--font-weight-bold); color: var(--color-neutral-900); letter-spacing: -0.01em; font-family: var(--font-family-mono); }
.drawer-status {
  font-size: 11px; font-weight: var(--font-weight-medium);
  padding: 3px 10px; border-radius: var(--border-radius-pill);
  white-space: nowrap;
}
.drawer-status.completed   { background: var(--color-success-100); color: var(--color-success-700); }
.drawer-status.in-progress { background: var(--color-info-100);    color: var(--color-info-700); }
.drawer-status.blocked     { background: var(--color-warning-100); color: var(--color-warning-700); }
.drawer-status.failed      { background: var(--color-danger-100);  color: var(--color-danger-700); }
.drawer-meta { display: flex; flex-direction: column; gap: 2px; margin-left: auto; text-align: right; }
.drawer-meta-id   { font-family: var(--font-family-mono); font-size: 11px; color: var(--color-neutral-400); }
.drawer-meta-date { font-size: 11px; color: var(--color-neutral-500); }
.drawer-close {
  width: 32px; height: 32px;
  border: 1px solid var(--border-color); border-radius: var(--border-radius-md);
  background: var(--color-white); color: var(--color-neutral-500);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; flex-shrink: 0;
  transition: background-color var(--transition-fast), color var(--transition-fast), border-color var(--transition-fast);
}
.drawer-close:hover { background: var(--color-neutral-50); color: var(--color-neutral-900); border-color: var(--border-color-hover); }

.drawer-body {
  flex: 1; overflow-y: auto;
  padding: var(--space-5);
  display: flex; flex-direction: column; gap: var(--space-5);
}
.drawer-section-title { font-size: var(--font-size-base); font-weight: var(--font-weight-semibold); color: var(--color-neutral-900); margin-bottom: var(--space-3); display: flex; align-items: baseline; justify-content: space-between; gap: var(--space-3); }
.drawer-section-meta { font-size: var(--font-size-xs); color: var(--color-neutral-400); font-weight: var(--font-weight-medium); }

.file-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: var(--space-3); }
.file-grid.cols-2 { grid-template-columns: repeat(2, 1fr); }
.file-card {
  border: 1px solid var(--border-color);
  border-radius: var(--border-radius-lg);
  background: var(--color-white);
  padding: var(--space-4) var(--space-3) var(--space-3);
  display: flex; flex-direction: column; align-items: center; gap: 6px;
  cursor: default; position: relative;
}
.file-card-icon { position: relative; width: 48px; height: 60px; }
.file-card-icon svg { width: 48px; height: 60px; }
.file-card-type {
  position: absolute; bottom: 12px; left: 50%; transform: translateX(-50%);
  font-size: 9px; font-weight: var(--font-weight-bold); font-family: var(--font-family-mono);
  letter-spacing: 0.04em; padding: 1px 6px; border-radius: 3px;
  white-space: nowrap;
}
.file-card-type.pdf  { background: var(--color-danger-50);  color: var(--color-danger-600); }
.file-card-type.json { background: var(--color-info-50);    color: var(--color-info-600); }
.file-card-type.ssr  { background: var(--color-info-50);    color: var(--color-info-600); }
.file-card-type.xml  { background: var(--color-success-50); color: var(--color-success-600); }
.file-card-type.qc   { background: var(--color-info-50);    color: var(--color-info-600); }
.file-card-type.uw   { background: var(--color-warning-50); color: var(--color-warning-600); }
.file-card-name { font-size: var(--font-size-sm); font-weight: var(--font-weight-semibold); color: var(--color-neutral-900); text-align: center; margin-top: 4px; word-break: break-word; }
.file-card-meta { font-size: 11px; color: var(--color-neutral-400); text-align: center; }
.file-card-flags { font-size: 11px; color: var(--color-danger-600); font-weight: var(--font-weight-medium); margin-top: 2px; }
.file-card-badge {
  position: absolute; top: -6px; right: -6px;
  min-width: 22px; height: 22px; padding: 0 6px;
  background: var(--color-danger-500); color: var(--color-white);
  border-radius: var(--border-radius-pill);
  font-size: 11px; font-weight: var(--font-weight-bold);
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 2px 4px rgba(239, 68, 68, 0.3);
}
.output-section {
  background: linear-gradient(135deg, var(--color-success-50) 0%, transparent 70%);
  border-radius: var(--border-radius-lg);
  padding: var(--space-3);
  margin: 0 calc(-1 * var(--space-3));
}

.pipeline-card {
  background: var(--color-white);
  border: 1px solid var(--border-color);
  border-radius: var(--border-radius-xl);
  padding: var(--space-4) var(--space-5);
}
.pipeline-card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: var(--space-3); }
.pipeline-card-title { font-size: var(--font-size-base); font-weight: var(--font-weight-semibold); color: var(--color-neutral-900); }
.step-counter { font-size: var(--font-size-sm); color: var(--color-neutral-400); }
.step-counter strong { font-weight: var(--font-weight-semibold); color: var(--color-neutral-900); }
.pipeline-steps { display: flex; flex-direction: column; }
.pipeline-step { display: grid; grid-template-columns: 32px 1fr auto; gap: 0 var(--space-3); position: relative; }
.step-col-icon { display: flex; flex-direction: column; align-items: center; position: relative; }
.pipeline-step:not(:last-child) .step-col-icon::after { content: ''; position: absolute; left: 13px; top: 29px; bottom: 0; width: 2px; background: var(--border-color); z-index: 0; }
.step-icon { width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0; z-index: 1; position: relative; }
.step-icon.done    { background: var(--color-success-100); color: var(--color-success-600); }
.step-icon.running { background: var(--color-info-100); color: var(--color-info-600); animation: step-pulse 1.5s ease-in-out infinite; }
.step-icon.todo    { background: var(--color-white); color: var(--color-neutral-300); border: 1.5px solid var(--border-color); }
.step-icon.error   { background: var(--color-danger-100); color: var(--color-danger-600); }
@keyframes step-pulse { 0%,100%{box-shadow:0 0 0 0 rgba(59,130,246,.25)} 50%{box-shadow:0 0 0 5px rgba(59,130,246,.08)} }
.step-col-body { padding-bottom: var(--space-3); }
.step-name-row { display: flex; align-items: baseline; gap: 8px; margin-bottom: 2px; }
.step-name { font-size: var(--font-size-base); font-weight: var(--font-weight-medium); color: var(--color-neutral-900); }
.step-name.todo { color: var(--color-neutral-400); }
.step-name.error { color: var(--color-danger-700); }
.step-name-time { font-size: var(--font-size-xs); color: var(--color-neutral-400); font-family: var(--font-family-mono); white-space: nowrap; }
.step-sub { font-size: var(--font-size-sm); color: var(--color-neutral-500); margin-bottom: var(--space-1); }
.step-sub.running { color: var(--color-info-600); font-weight: var(--font-weight-medium); }
.step-sub.error { color: var(--color-danger-600); }
.step-col-time { text-align: right; padding-bottom: var(--space-3); display: flex; align-items: flex-start; justify-content: flex-end; }
.step-dur-pill { display: inline-block; font-size: var(--font-size-xs); font-weight: var(--font-weight-medium); color: var(--color-neutral-500); background: var(--color-neutral-100); padding: 1px 6px; border-radius: var(--border-radius-pill); }
</style>
</head>
<body>

<header class="topbar">
  <a class="topbar-logo" href="dashboard.html">
    <div class="topbar-logo-icon">
      <svg width="14" height="14" viewBox="0 0 16 16" fill="none">
        <path d="M8 1.5L2.5 3.5V8c0 3.04 2.4 5.87 5.5 6.5 3.1-.63 5.5-3.46 5.5-6.5V3.5L8 1.5Z" stroke="#fff" stroke-width="1.3" stroke-linejoin="round"/>
        <path d="M5.5 8L7 9.5L10.5 6" stroke="#fff" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
    QC Appraisal
  </a>
  <nav class="topbar-nav" aria-label="Main">
    <a class="topbar-nav-item" href="dashboard.html">Observability</a>
    <a class="topbar-nav-item active" href="pipeline.html">Pipeline</a>
    <a class="topbar-nav-item" href="exceptions.html">Alerts</a>
    <a class="topbar-nav-item" href="reports.html">Reports</a>
  </nav>
  <div class="topbar-right">
    <div class="user-avatar">SU</div>
  </div>
</header>

<div class="page-wrap">

  <div class="page-header">
    <h1 class="page-title">Pipeline</h1>
    <span class="page-subtitle" id="pipeline-subtitle">— loans in flight</span>
    <div class="header-spacer"></div>
    <div class="date-filter">
      <button class="date-btn active" onclick="setDate(this)">All</button>
      <button class="date-btn" onclick="setDate(this)">Daily</button>
      <button class="date-btn" onclick="setDate(this)">Weekly</button>
      <button class="date-btn" onclick="setDate(this)">Monthly</button>
    </div>
  </div>

  <div class="summary-strip">
    <div class="summary-tile">
      <span class="summary-tile-label">In Flight</span>
      <span class="summary-tile-value" id="t-inflight">—</span>
      <span class="summary-tile-sub">across all stages</span>
    </div>
    <div class="summary-tile">
      <span class="summary-tile-label">Blocked</span>
      <span class="summary-tile-value" id="t-blocked">—</span>
      <span class="summary-tile-sub">awaiting reviewer / overdue</span>
    </div>
    <div class="summary-tile">
      <span class="summary-tile-label">Failed</span>
      <span class="summary-tile-value" id="t-failed">—</span>
      <span class="summary-tile-sub">ingest / classify errors</span>
    </div>
    <div class="summary-tile">
      <span class="summary-tile-label">End-to-End Avg</span>
      <span class="summary-tile-value" id="t-avg">—</span>
      <span class="summary-tile-sub">sum of stage averages</span>
    </div>
  </div>

  <div class="kanban" id="kanban"></div>
</div>

<!-- LOAN DRAWER -->
<div class="drawer-overlay" id="drawerOverlay" onclick="closeDrawer()"></div>
<aside class="drawer-panel" id="drawerPanel" role="dialog" aria-modal="true" aria-label="Loan details">
  <div class="drawer-header">
    <span class="drawer-id" id="drawerLoanId">—</span>
    <span class="drawer-status" id="drawerStatus">—</span>
    <div class="drawer-meta">
      <span class="drawer-meta-id" id="drawerSubId">—</span>
      <span class="drawer-meta-date" id="drawerDate">—</span>
    </div>
    <button class="drawer-close" onclick="closeDrawer()" aria-label="Close">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
        <path d="M3 3l8 8M11 3l-8 8" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
      </svg>
    </button>
  </div>
  <div class="drawer-body" id="drawerBody"></div>
</aside>

<!-- V1 / V2 switcher -->
<div style="position:fixed;bottom:20px;right:20px;background:var(--color-white);border:1px solid var(--border-color);border-radius:20px;padding:4px;display:flex;gap:4px;box-shadow:var(--shadow-md);z-index:9999;">
  <a href="pipeline.html" style="text-decoration:none;padding:6px 12px;border-radius:16px;font-size:12px;font-weight:600;color:var(--color-white);background:var(--color-neutral-900);">V1</a>
  <a href="dashboard-v2.html" style="text-decoration:none;padding:6px 12px;border-radius:16px;font-size:12px;font-weight:600;color:var(--color-neutral-500);">V2</a>
</div>

<script>
const STAGE_AVG_SEC = { ingest: 28, classify: 62, 'qc-check': 164, 'code-map': 91, 'report-gen': 68, 'uw-report': 110 };
const STAGE_LABELS = { ingest:'Ingest', classify:'Classify', 'qc-check':'QC Check', 'code-map':'Code Map', 'report-gen':'Report Gen', 'uw-report':'UW Report' };
const STAGE_ORDER = ['ingest','classify','qc-check','code-map','report-gen','uw-report'];

/* Same generator pattern as dashboard.html so loan IDs/states match */
const LOANS = (() => {
  const inFlight = { ingest:8, classify:14, 'qc-check':12, 'code-map':10, 'report-gen':9, 'uw-report':7 };
  const out = [];
  out.push({ id:'LN-000121', status:'failed', stage:'uw-report', timeTakenSec: 0, avgSec: 110 });
  out.push({ id:'LN-000122', status:'failed', stage:'code-map', timeTakenSec: 0, avgSec: 91 });
  let id = 200;
  STAGE_ORDER.forEach(stage => {
    const n = inFlight[stage];
    const avg = STAGE_AVG_SEC[stage];
    for (let i = 0; i < n; i++) {
      const isBlocked = i % 9 === 0;
      const takenPct = isBlocked ? 1.05 : 0.2 + (i / Math.max(1, n - 1)) * 0.75;
      out.push({
        id: `LN-${String(id++).padStart(6,'0')}`,
        status: isBlocked ? 'blocked' : 'in-progress',
        stage, avgSec: avg, timeTakenSec: Math.round(avg * takenPct)
      });
    }
  });
  return out;
})();

function fmtMMSS(sec) {
  const m = Math.floor(sec / 60);
  const s = sec % 60;
  return `${m}:${String(s).padStart(2,'0')}`;
}
function fmtMMSSh(sec) {
  const m = Math.floor(sec / 60);
  const s = sec % 60;
  return `${m}m ${String(s).padStart(2,'0')}s`;
}

function renderSummary() {
  const inFlight = LOANS.filter(l => l.status === 'in-progress' || l.status === 'blocked').length;
  const blocked = LOANS.filter(l => l.status === 'blocked').length;
  const failed = LOANS.filter(l => l.status === 'failed').length;
  const avg = STAGE_ORDER.reduce((s, k) => s + STAGE_AVG_SEC[k], 0);
  document.getElementById('t-inflight').textContent = inFlight;
  document.getElementById('t-blocked').textContent = blocked;
  document.getElementById('t-failed').textContent = failed;
  document.getElementById('t-avg').textContent = fmtMMSSh(avg);
  document.getElementById('pipeline-subtitle').textContent = `${inFlight} loans in flight · ${failed} failed`;
}

function renderKanban() {
  const root = document.getElementById('kanban');
  const byStage = {};
  STAGE_ORDER.forEach(s => byStage[s] = []);
  LOANS.forEach(l => {
    if (l.stage && byStage[l.stage]) byStage[l.stage].push(l);
  });

  // Each column shows: in-progress (sorted by progress desc) + blocked (top) + failed (top)
  root.innerHTML = STAGE_ORDER.map(stage => {
    const loans = byStage[stage] || [];
    const failed = loans.filter(l => l.status === 'failed');
    const blocked = loans.filter(l => l.status === 'blocked');
    const running = loans.filter(l => l.status === 'in-progress')
      .sort((a, b) => (b.timeTakenSec / b.avgSec) - (a.timeTakenSec / a.avgSec));
    const ordered = [...failed, ...blocked, ...running];
    const total = ordered.length;
    const dotClass = blocked.length || failed.length ? 'is-blocked' : 'is-running';
    const dotColor = blocked.length || failed.length
      ? 'var(--color-warning-500)'
      : 'var(--color-success-500)';

    const cards = ordered.length === 0
      ? `<div class="col-empty">No loans in this stage</div>`
      : ordered.map(l => loanCardHTML(l)).join('');

    return `
      <div class="col">
        <div class="col-head">
          <div class="col-title-row">
            <span class="col-dot" style="background:${dotColor}"></span>
            <span class="col-title">${STAGE_LABELS[stage]}</span>
            <span class="col-count">${total}</span>
          </div>
          <div class="col-meta">
            <span class="col-meta-label">Avg latency</span>
            <span class="col-meta-value">${fmtMMSS(STAGE_AVG_SEC[stage])}</span>
          </div>
        </div>
        <div class="col-body">${cards}</div>
      </div>`;
  }).join('');

  root.addEventListener('click', (e) => {
    const card = e.target.closest('.loan-card');
    if (!card || !card.dataset.loanId) return;
    openDrawer(card.dataset.loanId);
  });
}

function loanCardHTML(l) {
  const cls = l.status === 'failed' ? 'is-failed' : l.status === 'blocked' ? 'is-blocked' : '';
  const pill = l.status === 'failed'
    ? '<span class="loan-card-pill failed">Failed</span>'
    : l.status === 'blocked'
      ? '<span class="loan-card-pill blocked">Blocked</span>'
      : '';
  const pct = l.status === 'failed'
    ? 100
    : Math.min(100, Math.round((l.timeTakenSec / l.avgSec) * 100));
  const fillCls = l.status === 'blocked' || l.status === 'failed' ? 'blocked' : '';
  const elapsed = `${fmtMMSS(l.timeTakenSec)} / ${fmtMMSS(l.avgSec)}`;
  return `
    <div class="loan-card ${cls}" data-loan-id="${l.id}">
      <div class="loan-card-top">
        <span class="loan-card-id">${l.id}</span>
        ${pill}
      </div>
      <div class="loan-card-progress">
        <div class="loan-card-progress-fill ${fillCls}" style="width:${pct}%"></div>
      </div>
      <div class="loan-card-time">
        <span>${elapsed}</span>
        <span>${pct}%</span>
      </div>
    </div>`;
}

function setDate(btn) {
  btn.parentElement.querySelectorAll('.date-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}

renderSummary();
renderKanban();

/* ── DRAWER (V1 — same shape as dashboard.html) ── */
const ICON_CHECK_DWR = `<svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M2.5 7l3 3 6-6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
const ICON_X_DWR     = `<svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M3 3l8 8M11 3l-8 8" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>`;
const ICON_SPIN_DWR  = `<svg width="14" height="14" viewBox="0 0 14 14" fill="none"><circle cx="7" cy="7" r="5" stroke="currentColor" stroke-width="2" stroke-dasharray="8 24" stroke-linecap="round"><animateTransform attributeName="transform" type="rotate" from="0 7 7" to="360 7 7" dur="0.8s" repeatCount="indefinite"/></circle></svg>`;
const FILE_SVG_DWR = `<svg viewBox="0 0 48 60" fill="none">
  <path d="M6 0h26l10 10v46a4 4 0 0 1-4 4H6a4 4 0 0 1-4-4V4a4 4 0 0 1 4-4z" fill="#fff" stroke="#e5e7eb" stroke-width="1.2"/>
  <path d="M32 0v6a4 4 0 0 0 4 4h6" stroke="#e5e7eb" stroke-width="1.2" fill="#f9fafb"/>
</svg>`;

function buildSteps(loan) {
  const ts = '9:41 AM';
  const out = STAGE_ORDER.map(s => ({
    stage: s, name: STAGE_LABELS[s], status: 'todo', sub: 'Waiting', time: '', dur: ''
  }));
  if (loan.status === 'completed') {
    out.forEach(st => { st.status = 'done'; st.sub = 'Completed'; st.time = ts; st.dur = fmtMMSS(STAGE_AVG_SEC[st.stage]); });
  } else if (loan.status === 'failed') {
    const idx = STAGE_ORDER.indexOf(loan.stage);
    if (idx >= 0) {
      for (let i = 0; i < idx; i++) {
        out[i].status = 'done'; out[i].sub = 'Completed'; out[i].time = ts;
        out[i].dur = fmtMMSS(STAGE_AVG_SEC[out[i].stage]);
      }
      out[idx].status = 'error';
      out[idx].sub = 'Failed — see Alerts';
      out[idx].time = ts;
    }
  } else {
    const idx = STAGE_ORDER.indexOf(loan.stage);
    if (idx >= 0) {
      for (let i = 0; i < idx; i++) {
        out[i].status = 'done'; out[i].sub = 'Completed'; out[i].time = ts;
        out[i].dur = fmtMMSS(STAGE_AVG_SEC[out[i].stage]);
      }
      const isBlocked = loan.status === 'blocked';
      out[idx].status = isBlocked ? 'error' : 'running';
      out[idx].time = ts;
      out[idx].sub = isBlocked
        ? 'Blocked — overdue'
        : `Running · ${fmtMMSS(loan.timeTakenSec || 0)} / ${fmtMMSS(loan.avgSec || STAGE_AVG_SEC[loan.stage])}`;
    }
  }
  return out;
}

function stepHTMLDwr(s) {
  const icons = { done: ICON_CHECK_DWR, running: ICON_SPIN_DWR, todo: '', error: ICON_X_DWR };
  const durPill = (s.dur && s.status === 'done') ? `<div class="step-dur-pill">${s.dur}</div>` : '';
  const subClass = s.status === 'running' ? 'running' : s.status === 'error' ? 'error' : '';
  return `
    <div class="pipeline-step">
      <div class="step-col-icon">
        <div class="step-icon ${s.status}">${icons[s.status] || ''}</div>
      </div>
      <div class="step-col-body">
        <div class="step-name-row">
          <span class="step-name ${s.status}">${s.name}</span>
          ${s.time ? `<span class="step-name-time">${s.time}</span>` : ''}
        </div>
        <div class="step-sub ${subClass}">${s.sub}</div>
      </div>
      <div class="step-col-time">${durPill}</div>
    </div>`;
}

function fileCardHTML(f) {
  const badge = f.flags ? `<span class="file-card-badge">${f.flags}</span>` : '';
  const flagText = f.flags ? `<div class="file-card-flags">${f.flags} flag${f.flags > 1 ? 's' : ''} to review</div>` : '';
  const meta = f.meta ? `<div class="file-card-meta">${f.meta}</div>` : '';
  return `
    <div class="file-card">
      ${badge}
      <div class="file-card-icon">
        ${FILE_SVG_DWR}
        <span class="file-card-type ${f.type}">${f.type.toUpperCase()}</span>
      </div>
      <div class="file-card-name">${f.name}</div>
      ${meta}
      ${flagText}
    </div>`;
}

function openDrawer(loanId) {
  const loan = LOANS.find(l => l.id === loanId);
  if (!loan) return;
  const idShort = loan.id.replace('LN-000', 'LN');
  const traceId = `${idShort}—${Date.now().toString().slice(-10)}`;

  document.getElementById('drawerLoanId').textContent = idShort;
  document.getElementById('drawerSubId').textContent = traceId;
  document.getElementById('drawerDate').textContent = 'Apr 30, 9:41 AM';
  const statusEl = document.getElementById('drawerStatus');
  statusEl.className = 'drawer-status ' + loan.status;
  statusEl.textContent = loan.status === 'in-progress' ? 'In Progress'
                       : loan.status.charAt(0).toUpperCase() + loan.status.slice(1);

  const sourceFiles = [
    { type: 'pdf',  name: `${idShort}_appraisal.pdf`,    meta: '4.2 MB · Apr 30, 9:41 AM' },
    { type: 'ssr',  name: `${idShort}_ssr_response.json`, meta: '186 KB · Apr 30, 9:41 AM' },
    { type: 'xml',  name: `${idShort}_uad.xml`,           meta: '92 KB · Apr 30, 9:41 AM' },
  ];
  const outputFiles = loan.status === 'completed' ? [
    { type: 'qc', name: 'QC Report',         meta: 'Generated Apr 30', flags: 5 },
    { type: 'uw', name: 'Underwriter Packet', meta: `${idShort}_uw_packet.pdf` },
  ] : [];

  const steps = buildSteps(loan);
  const stepsHTML = steps.map(stepHTMLDwr).join('');
  const stepsDoneCount = steps.filter(s => s.status === 'done').length;

  let body = '';
  if (outputFiles.length) {
    body += `
      <section class="output-section">
        <div class="drawer-section-title">QC Report <span class="drawer-section-meta">${outputFiles.length} files</span></div>
        <div class="file-grid cols-2">${outputFiles.map(fileCardHTML).join('')}</div>
      </section>`;
  }
  body += `
    <div class="pipeline-card">
      <div class="pipeline-card-header">
        <span class="pipeline-card-title">Pipeline Steps</span>
        <span class="step-counter"><strong>${stepsDoneCount}</strong> / ${steps.length} completed</span>
      </div>
      <div class="pipeline-steps">${stepsHTML}</div>
    </div>
    <section>
      <div class="drawer-section-title">Input Report <span class="drawer-section-meta">${sourceFiles.length} files</span></div>
      <div class="file-grid">${sourceFiles.map(fileCardHTML).join('')}</div>
    </section>`;

  document.getElementById('drawerBody').innerHTML = body;
  document.getElementById('drawerOverlay').classList.add('is-open');
  document.getElementById('drawerPanel').classList.add('is-open');
}

function closeDrawer() {
  document.getElementById('drawerOverlay').classList.remove('is-open');
  document.getElementById('drawerPanel').classList.remove('is-open');
}

document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') closeDrawer();
});
</script>

</body>
