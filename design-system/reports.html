<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QC Appraisal — Reports</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="tokens.css">
<link rel="stylesheet" href="components.css">
<style>
/* ── SHELL (V1 — top nav) ── */
html, body { height: 100%; }
body {
  background: var(--surface-page);
  min-width: 1024px;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  color: var(--color-neutral-900);
  font-family: var(--font-family-base);
}

.topbar {
  position: sticky; top: 0; z-index: var(--z-sticky);
  flex-shrink: 0; height: 56px; padding: 0 var(--space-8); gap: var(--space-4);
  background: var(--color-white);
  border-bottom: 1px solid var(--border-color);
  display: flex; align-items: stretch;
}
.topbar-logo { display: flex; align-items: center; gap: var(--space-2); font-size: var(--font-size-md); font-weight: var(--font-weight-semibold); color: var(--color-neutral-900); text-decoration: none; }
.topbar-logo-icon { width: 26px; height: 26px; border-radius: var(--border-radius-md); background: var(--color-neutral-900); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.topbar-nav { display: flex; align-items: stretch; margin-left: var(--space-6); gap: 0; }
.topbar-nav-item {
  display: flex; align-items: center;
  padding: 0 var(--space-4);
  font-size: var(--font-size-sm);
  font-weight: var(--font-weight-medium);
  color: var(--color-neutral-500);
  text-decoration: none;
  border-bottom: 2px solid transparent;
  transition: color var(--transition-fast), border-color var(--transition-fast);
  white-space: nowrap;
  position: relative;
  top: 1px;
}
.topbar-nav-item:hover { color: var(--color-neutral-900); }
.topbar-nav-item.active {
  color: var(--color-brand-600);
  font-weight: var(--font-weight-semibold);
  border-bottom-color: var(--color-brand-600);
}
.topbar-right { margin-left: auto; display: flex; align-items: center; gap: var(--space-5); }
.user-avatar { width: 28px; height: 28px; border-radius: var(--border-radius-pill); background: var(--color-brand-100); display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: var(--font-weight-semibold); color: var(--color-brand-600); border: 1px solid var(--border-color); }

/* ── PAGE ── */
.page-wrap {
  flex: 1; overflow-y: auto;
  padding: var(--space-6) var(--space-8) var(--space-8);
  display: flex; flex-direction: column; gap: var(--space-6);
  min-height: 0;
}
.page-header { display: flex; align-items: baseline; gap: var(--space-4); }
.page-title {
  font-size: var(--font-size-2xl); font-weight: var(--font-weight-bold);
  letter-spacing: -0.02em; line-height: 1.1; color: var(--color-neutral-900); margin: 0;
}
.page-count { font-size: var(--font-size-sm); font-weight: var(--font-weight-medium); color: var(--color-neutral-400); }

/* ── FILTER BAR ── */
.filter-bar { display: flex; align-items: center; gap: var(--space-3); }
.filter-search {
  display: flex; align-items: center; gap: 8px;
  padding: 7px var(--space-3);
  border: 1px solid var(--border-color); border-radius: var(--border-radius-md);
  background: var(--color-white); width: 260px;
  transition: border-color var(--transition-fast), box-shadow var(--transition-fast);
}
.filter-search:focus-within { border-color: var(--color-brand-400); box-shadow: 0 0 0 3px var(--color-brand-100); }
.filter-search svg { color: var(--color-neutral-400); flex-shrink: 0; }
.filter-search input { flex: 1; border: none; outline: none; background: transparent; font-size: var(--font-size-sm); font-family: var(--font-family-base); color: var(--color-neutral-900); }
.filter-search input::placeholder { color: var(--color-neutral-400); }
.download-btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 7px var(--space-4); border-radius: var(--border-radius-md);
  border: 1px solid var(--border-color); background: var(--color-white);
  font-size: var(--font-size-sm); font-weight: var(--font-weight-medium);
  color: var(--color-neutral-700); cursor: pointer;
  transition: background-color var(--transition-fast), border-color var(--transition-fast);
}
.download-btn:hover { background: var(--color-neutral-50); border-color: var(--color-neutral-400); }

/* ── TABLE ── */
.table-wrap {
  background: var(--color-white);
  border: 1px solid var(--border-color);
  border-radius: var(--border-radius-xl);
  overflow: hidden;
}
table { width: 100%; border-collapse: collapse; }
thead { background: var(--color-neutral-50); border-bottom: 1px solid var(--border-color); }
thead th {
  padding: var(--space-3) var(--space-4); text-align: left;
  font-size: 11px; font-weight: var(--font-weight-semibold);
  color: var(--color-neutral-500); text-transform: uppercase; letter-spacing: 0.06em;
  white-space: nowrap;
}
tbody tr {
  border-bottom: 1px solid var(--color-neutral-100);
  transition: background-color var(--transition-fast); cursor: pointer;
}
tbody tr:last-child { border-bottom: none; }
tbody tr:hover { background: var(--color-neutral-50); }
tbody td { padding: var(--space-3) var(--space-4); font-size: var(--font-size-sm); vertical-align: middle; }

.td-loan-id { font-family: var(--font-family-mono); font-size: 12px; font-weight: var(--font-weight-semibold); color: var(--color-neutral-900); white-space: nowrap; }
.td-borrower { font-weight: var(--font-weight-medium); color: var(--color-neutral-900); }
.td-address { font-size: 12px; color: var(--color-neutral-500); }
.td-date { font-size: 12px; color: var(--color-neutral-500); white-space: nowrap; }
.score-badge {
  display: inline-flex; align-items: center;
  padding: 2px 8px; border-radius: var(--border-radius-pill);
  font-size: 12px; font-weight: var(--font-weight-bold);
  font-variant-numeric: tabular-nums;
}
.score-badge.high   { background: var(--color-success-100); color: var(--color-success-700); }
.score-badge.medium { background: var(--color-warning-100); color: var(--color-warning-700); }
.score-badge.low    { background: var(--color-danger-100);  color: var(--color-danger-700); }
.file-doc {
  display: inline-flex; align-items: center; gap: 5px;
  font-size: 12px; font-weight: var(--font-weight-medium);
  color: var(--color-neutral-500); text-decoration: none;
  transition: color var(--transition-fast);
  white-space: nowrap;
}
.file-doc:hover { color: var(--color-brand-600); }
.file-doc svg { flex-shrink: 0; transition: color var(--transition-fast); color: var(--color-neutral-300); }
.file-doc:hover svg { color: var(--color-brand-400); }

/* ── LOAN DRAWER (V1 — same as dashboard.html) ── */
.drawer-overlay {
  position: fixed; inset: 0;
  background: rgba(15, 23, 42, 0.4);
  backdrop-filter: blur(2px);
  opacity: 0; pointer-events: none;
  transition: opacity 200ms ease;
  z-index: 9000;
}
.drawer-overlay.is-open { opacity: 1; pointer-events: auto; }

.drawer-panel {
  position: fixed; top: 0; right: 0; bottom: 0;
  width: 540px; max-width: 92vw;
  background: var(--color-white);
  border-left: 1px solid var(--border-color);
  box-shadow: -8px 0 24px rgba(15, 23, 42, 0.08);
  transform: translateX(100%);
  transition: transform 280ms cubic-bezier(0.16, 1, 0.3, 1);
  z-index: 9100;
  display: flex; flex-direction: column;
}
.drawer-panel.is-open { transform: translateX(0); }

.drawer-header {
  display: flex; align-items: center; gap: var(--space-3);
  padding: var(--space-4) var(--space-5);
  border-bottom: 1px solid var(--border-color);
  flex-shrink: 0;
}
.drawer-id { font-size: var(--font-size-xl); font-weight: var(--font-weight-bold); color: var(--color-neutral-900); letter-spacing: -0.01em; font-family: var(--font-family-mono); }
.drawer-status {
  font-size: 11px; font-weight: var(--font-weight-medium);
  padding: 3px 10px; border-radius: var(--border-radius-pill);
  white-space: nowrap;
}
.drawer-status.completed   { background: var(--color-success-100); color: var(--color-success-700); }
.drawer-status.in-progress { background: var(--color-info-100);    color: var(--color-info-700); }
.drawer-status.blocked     { background: var(--color-warning-100); color: var(--color-warning-700); }
.drawer-status.failed      { background: var(--color-danger-100);  color: var(--color-danger-700); }
.drawer-meta { display: flex; flex-direction: column; gap: 2px; margin-left: auto; text-align: right; }
.drawer-meta-id   { font-family: var(--font-family-mono); font-size: 11px; color: var(--color-neutral-400); }
.drawer-meta-date { font-size: 11px; color: var(--color-neutral-500); }
.drawer-close {
  width: 32px; height: 32px;
  border: 1px solid var(--border-color);
  border-radius: var(--border-radius-md);
  background: var(--color-white);
  color: var(--color-neutral-500);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; flex-shrink: 0;
  transition: background-color var(--transition-fast), color var(--transition-fast), border-color var(--transition-fast);
}
.drawer-close:hover { background: var(--color-neutral-50); color: var(--color-neutral-900); border-color: var(--border-color-hover); }

.drawer-body {
  flex: 1; overflow-y: auto;
  padding: var(--space-5);
  display: flex; flex-direction: column; gap: var(--space-5);
}
.drawer-section-title { font-size: var(--font-size-base); font-weight: var(--font-weight-semibold); color: var(--color-neutral-900); margin-bottom: var(--space-3); display: flex; align-items: baseline; justify-content: space-between; gap: var(--space-3); }
.drawer-section-meta { font-size: var(--font-size-xs); color: var(--color-neutral-400); font-weight: var(--font-weight-medium); }

.file-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: var(--space-3); }
.file-grid.cols-2 { grid-template-columns: repeat(2, 1fr); }
.file-card {
  border: 1px solid var(--border-color);
  border-radius: var(--border-radius-lg);
  background: var(--color-white);
  padding: var(--space-4) var(--space-3) var(--space-3);
  display: flex; flex-direction: column; align-items: center; gap: 6px;
  transition: border-color var(--transition-fast), background-color var(--transition-fast);
  cursor: default;
  position: relative;
}
.file-card:hover { border-color: var(--border-color-hover); background: var(--color-neutral-50); }
.file-card-icon { position: relative; width: 48px; height: 60px; }
.file-card-icon svg { width: 48px; height: 60px; }
.file-card-type {
  position: absolute; bottom: 12px; left: 50%; transform: translateX(-50%);
  font-size: 9px; font-weight: var(--font-weight-bold); font-family: var(--font-family-mono);
  letter-spacing: 0.04em; padding: 1px 6px; border-radius: 3px;
  white-space: nowrap;
}
.file-card-type.pdf  { background: var(--color-danger-50);  color: var(--color-danger-600); }
.file-card-type.json { background: var(--color-info-50);    color: var(--color-info-600); }
.file-card-type.ssr  { background: var(--color-info-50);    color: var(--color-info-600); }
.file-card-type.xml  { background: var(--color-success-50); color: var(--color-success-600); }
.file-card-type.qc   { background: var(--color-info-50);    color: var(--color-info-600); }
.file-card-type.uw   { background: var(--color-warning-50); color: var(--color-warning-600); }
.file-card-name { font-size: var(--font-size-sm); font-weight: var(--font-weight-semibold); color: var(--color-neutral-900); text-align: center; margin-top: 4px; word-break: break-word; }
.file-card-meta { font-size: 11px; color: var(--color-neutral-400); text-align: center; }
.file-card-flags { font-size: 11px; color: var(--color-danger-600); font-weight: var(--font-weight-medium); margin-top: 2px; }
.file-card-badge {
  position: absolute; top: -6px; right: -6px;
  min-width: 22px; height: 22px;
  padding: 0 6px;
  background: var(--color-danger-500); color: var(--color-white);
  border-radius: var(--border-radius-pill);
  font-size: 11px; font-weight: var(--font-weight-bold);
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 2px 4px rgba(239, 68, 68, 0.3);
}
.output-section {
  background: linear-gradient(135deg, var(--color-success-50) 0%, transparent 70%);
  border-radius: var(--border-radius-lg);
  padding: var(--space-3);
  margin: 0 calc(-1 * var(--space-3));
}

/* pipeline card — parity with V2 loan-detail */
.pipeline-card {
  background: var(--color-white);
  border: 1px solid var(--border-color);
  border-radius: var(--border-radius-xl);
  padding: var(--space-4) var(--space-5);
}
.pipeline-card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: var(--space-3); }
.pipeline-card-title { font-size: var(--font-size-base); font-weight: var(--font-weight-semibold); color: var(--color-neutral-900); }
.step-counter { font-size: var(--font-size-sm); color: var(--color-neutral-400); }
.step-counter strong { font-weight: var(--font-weight-semibold); color: var(--color-neutral-900); }
.pipeline-steps { display: flex; flex-direction: column; }
.pipeline-step { display: grid; grid-template-columns: 32px 1fr auto; gap: 0 var(--space-3); position: relative; }
.step-col-icon { display: flex; flex-direction: column; align-items: center; position: relative; }
.pipeline-step:not(:last-child) .step-col-icon::after { content: ''; position: absolute; left: 13px; top: 29px; bottom: 0; width: 2px; background: var(--border-color); z-index: 0; }
.step-icon { width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0; z-index: 1; position: relative; }
.step-icon.done    { background: var(--color-success-100); color: var(--color-success-600); }
.step-icon.running { background: var(--color-info-100); color: var(--color-info-600); animation: step-pulse 1.5s ease-in-out infinite; }
.step-icon.todo    { background: var(--color-white); color: var(--color-neutral-300); border: 1.5px solid var(--border-color); }
.step-icon.error   { background: var(--color-danger-100); color: var(--color-danger-600); }
.step-icon.skipped { background: var(--color-neutral-50); color: var(--color-neutral-300); border: 1.5px dashed var(--border-color); }
@keyframes step-pulse { 0%,100%{box-shadow:0 0 0 0 rgba(59,130,246,.25)} 50%{box-shadow:0 0 0 5px rgba(59,130,246,.08)} }
.step-col-body { padding-bottom: var(--space-3); }
.step-name-row { display: flex; align-items: baseline; gap: 8px; margin-bottom: 2px; }
.step-name { font-size: var(--font-size-base); font-weight: var(--font-weight-medium); color: var(--color-neutral-900); }
.step-name.todo    { color: var(--color-neutral-400); }
.step-name.skipped { color: var(--color-neutral-400); }
.step-name.error   { color: var(--color-danger-700); }
.step-name-time { font-size: var(--font-size-xs); color: var(--color-neutral-400); font-family: var(--font-family-mono); white-space: nowrap; }
.step-sub { font-size: var(--font-size-sm); color: var(--color-neutral-500); margin-bottom: var(--space-1); }
.step-sub.running { color: var(--color-info-600); font-weight: var(--font-weight-medium); }
.step-sub.error   { color: var(--color-danger-600); }
.step-col-time { text-align: right; padding-bottom: var(--space-3); display: flex; align-items: flex-start; justify-content: flex-end; }
.step-dur-pill { display: inline-block; font-size: var(--font-size-xs); font-weight: var(--font-weight-medium); color: var(--color-neutral-500); background: var(--color-neutral-100); padding: 1px 6px; border-radius: var(--border-radius-pill); }
</style>
</head>
<body>

<header class="topbar">
  <a class="topbar-logo" href="dashboard.html">
    <div class="topbar-logo-icon">
      <svg width="14" height="14" viewBox="0 0 16 16" fill="none">
        <path d="M8 1.5L2.5 3.5V8c0 3.04 2.4 5.87 5.5 6.5 3.1-.63 5.5-3.46 5.5-6.5V3.5L8 1.5Z" stroke="#fff" stroke-width="1.3" stroke-linejoin="round"/>
        <path d="M5.5 8L7 9.5L10.5 6" stroke="#fff" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
    QC Appraisal
  </a>
  <nav class="topbar-nav" aria-label="Main">
    <a class="topbar-nav-item" href="dashboard.html">Observability</a>
    <a class="topbar-nav-item" href="pipeline.html">Pipeline</a>
    <a class="topbar-nav-item" href="exceptions.html">Alerts</a>
    <a class="topbar-nav-item active" href="reports.html">Reports</a>
  </nav>
  <div class="topbar-right">
    <div class="search-wrap-top" role="search">
      <label class="search-input-top">
        <svg width="14" height="14" viewBox="0 0 16 16" fill="none" aria-hidden="true">
          <circle cx="7" cy="7" r="5" stroke="currentColor" stroke-width="1.5"/>
          <path d="M11 11l3 3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
        <input id="loanSearch" type="text" placeholder="Search reports by loan ID…" aria-label="Search reports by loan ID" autocomplete="off"
               oninput="onSearchInput()" onfocus="onSearchInput()" onkeydown="onSearchKey(event)"/>
        <span class="search-kbd">/</span>
      </label>
      <div class="search-results" id="searchResults"></div>
    </div>
    <div class="user-avatar">SU</div>
  </div>
</header>

<div class="page-wrap">

  <div class="page-header">
    <h1 class="page-title">Reports</h1>
    <span class="page-count" id="rptCount">20 loans</span>
  </div>

  <div class="filter-bar">
    <label class="filter-search" style="flex:1">
      <svg width="14" height="14" viewBox="0 0 16 16" fill="none">
        <circle cx="7" cy="7" r="5" stroke="currentColor" stroke-width="1.5"/>
        <path d="M11 11l3 3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
      <input type="text" placeholder="Search by loan ID or borrower…" id="searchInput" oninput="filterTable()">
    </label>
    <button class="download-btn">
      <svg width="14" height="14" viewBox="0 0 16 16" fill="none">
        <path d="M8 2v8M5 7l3 3 3-3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M3 13h10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
      Export CSV
    </button>
  </div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>Loan ID</th>
          <th>Borrower</th>
          <th>Property</th>
          <th>Completed</th>
          <th>QC Score</th>
          <th>QC Report</th>
          <th>UW Report</th>
          <th>Source Files</th>
        </tr>
      </thead>
      <tbody id="rptTable"></tbody>
    </table>
  </div>

</div>

<!-- LOAN DRAWER -->
<div class="drawer-overlay" id="drawerOverlay" onclick="closeDrawer()"></div>
<aside class="drawer-panel" id="drawerPanel" role="dialog" aria-modal="true" aria-label="Loan details">
  <div class="drawer-header">
    <span class="drawer-id" id="drawerLoanId">—</span>
    <span class="drawer-status" id="drawerStatus">—</span>
    <div class="drawer-meta">
      <span class="drawer-meta-id" id="drawerSubId">—</span>
      <span class="drawer-meta-date" id="drawerDate">—</span>
    </div>
    <button class="drawer-close" onclick="closeDrawer()" aria-label="Close">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
        <path d="M3 3l8 8M11 3l-8 8" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
      </svg>
    </button>
  </div>
  <div class="drawer-body" id="drawerBody"></div>
</aside>

<!-- V1 / V2 switcher -->
<div style="position:fixed;bottom:20px;right:20px;background:var(--color-white);border:1px solid var(--border-color);border-radius:20px;padding:4px;display:flex;gap:4px;box-shadow:var(--shadow-md);z-index:9999;">
  <a href="reports.html" style="text-decoration:none;padding:6px 12px;border-radius:16px;font-size:12px;font-weight:600;color:var(--color-white);background:var(--color-neutral-900);">V1</a>
  <a href="reports-v2.html" style="text-decoration:none;padding:6px 12px;border-radius:16px;font-size:12px;font-weight:600;color:var(--color-neutral-500);">V2</a>
</div>

<script>
const STAGE_LABELS = { ingest:'Ingest', classify:'Classify', 'qc-check':'QC Check', 'code-map':'Code Map', 'report-gen':'Report Gen', 'uw-report':'UW Report' };
const STAGE_ORDER = ['ingest','classify','qc-check','code-map','report-gen','uw-report'];
const STAGE_AVG_SEC = { ingest: 28, classify: 62, 'qc-check': 164, 'code-map': 91, 'report-gen': 68, 'uw-report': 110 };

const REPORTS = [

  { id:'LN-000258', borrower:'Maria Santos',      address:'220 Oak Ave, Denver CO',         completed:'Apr 30, 2:05 AM', score:91, decision:'Approved'     },
  { id:'LN-000259', borrower:'David Kim',         address:'78 Birch Ln, Portland OR',       completed:'Apr 30, 2:05 AM', score:84, decision:'Needs review' },
  { id:'LN-000260', borrower:'Angela Brooks',     address:'1103 Cedar Rd, Nashville TN',    completed:'Apr 30, 7:41 AM', score:93, decision:'Approved'     },
  { id:'LN-000261', borrower:'Thomas Reyes',      address:'55 Pine St, Charlotte NC',       completed:'Apr 30, 7:38 AM', score:78, decision:'Needs review' },
  { id:'LN-000262', borrower:'Susan Patel',       address:'892 Maple Dr, Phoenix AZ',       completed:'Apr 30, 7:35 AM', score:89, decision:'Approved'     },

function scoreClass(s) { return s >= 85 ? 'high' : s >= 70 ? 'medium' : 'low'; }

  tbody.innerHTML = data.map(r => `
    <tr onclick="openDrawer('${r.id}')">
      <td class="td-loan-id">${r.id}</td>
      <td class="td-borrower">${r.borrower}</td>
      <td class="td-address">${r.address}</td>
      <td class="td-date">${r.completed}</td>
      <td><span class="score-badge ${scoreClass(r.score)}">${r.score}</span></td>
      <td>
        <a class="file-doc" href="#" onclick="event.stopPropagation();return false">
          <svg width="12" height="14" viewBox="0 0 12 14" fill="none"><path d="M1.5 0h6.086L11 2.914V12.5a1 1 0 01-1 1h-8a1 1 0 01-1-1V1a1 1 0 011-1z" fill="currentColor" fill-opacity=".06" stroke="currentColor" stroke-width="1"/><path d="M7.5 0v3h3" stroke="currentColor" stroke-width="1"/></svg>

function filterTable() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  const filtered = REPORTS.filter(r =>
    !q || r.id.toLowerCase().includes(q) || r.borrower.toLowerCase().includes(q)
  );
  renderTable(filtered);
}

renderTable(REPORTS);

/* ── DRAWER (V1 — same shape as dashboard.html) ── */
const ICON_CHECK_DWR = `<svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M2.5 7l3 3 6-6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
const ICON_X_DWR     = `<svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M3 3l8 8M11 3l-8 8" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>`;
const ICON_SPIN_DWR  = `<svg width="14" height="14" viewBox="0 0 14 14" fill="none"><circle cx="7" cy="7" r="5" stroke="currentColor" stroke-width="2" stroke-dasharray="8 24" stroke-linecap="round"><animateTransform attributeName="transform" type="rotate" from="0 7 7" to="360 7 7" dur="0.8s" repeatCount="indefinite"/></circle></svg>`;
const FILE_SVG_DWR = `<svg viewBox="0 0 48 60" fill="none">
  <path d="M6 0h26l10 10v46a4 4 0 0 1-4 4H6a4 4 0 0 1-4-4V4a4 4 0 0 1 4-4z" fill="#fff" stroke="#e5e7eb" stroke-width="1.2"/>
  <path d="M32 0v6a4 4 0 0 0 4 4h6" stroke="#e5e7eb" stroke-width="1.2" fill="#f9fafb"/>
</svg>`;

function fmtMMSSdash(sec) {
  const m = Math.floor(sec / 60);
  const s = sec % 60;
  return `${m}:${String(s).padStart(2,'0')}`;
}

function buildSteps(loan) {
  const ts = '9:41 AM';
  const out = STAGE_ORDER.map(s => ({
    stage: s, name: STAGE_LABELS[s], status: 'todo', sub: 'Waiting', time: '', dur: ''
  }));
  if (loan.status === 'completed') {
    out.forEach(st => { st.status = 'done'; st.sub = 'Completed'; st.time = ts; st.dur = fmtMMSSdash(STAGE_AVG_SEC[st.stage]); });
  }
  return out;
}

function stepHTMLDwr(s) {
  const icons = { done: ICON_CHECK_DWR, running: ICON_SPIN_DWR, todo: '', error: ICON_X_DWR, skipped: '' };
  const durPill = (s.dur && s.status === 'done') ? `<div class="step-dur-pill">${s.dur}</div>` : '';
  const subClass = s.status === 'running' ? 'running' : s.status === 'error' ? 'error' : '';
  return `
    <div class="pipeline-step">
      <div class="step-col-icon">
        <div class="step-icon ${s.status}">${icons[s.status] || ''}</div>
      </div>
      <div class="step-col-body">
        <div class="step-name-row">
          <span class="step-name ${s.status}">${s.name}</span>
          ${s.time ? `<span class="step-name-time">${s.time}</span>` : ''}
        </div>
        <div class="step-sub ${subClass}">${s.sub}</div>
      </div>
      <div class="step-col-time">${durPill}</div>
    </div>`;
}

function fileCardHTML(f) {
  const badge = f.flags ? `<span class="file-card-badge">${f.flags}</span>` : '';
  const flagText = f.flags ? `<div class="file-card-flags">${f.flags} flag${f.flags > 1 ? 's' : ''} to review</div>` : '';
  const meta = f.meta ? `<div class="file-card-meta">${f.meta}</div>` : '';
  return `
    <div class="file-card">
      ${badge}
      <div class="file-card-icon">
        ${FILE_SVG_DWR}
        <span class="file-card-type ${f.type}">${f.type.toUpperCase()}</span>
      </div>
      <div class="file-card-name">${f.name}</div>
      ${meta}
      ${flagText}
    </div>`;
}

function openDrawer(loanId) {
  const r = REPORTS.find(x => x.id === loanId);
  if (!r) return;
  const sr = document.getElementById('searchResults'); if (sr) sr.classList.remove('is-open');
  const si = document.getElementById('loanSearch'); if (si) si.blur();
  const loan = { id: r.id, status: 'completed', stage: '' };

  const idShort = loan.id.replace('LN-000', 'LN');
  const traceId = `${idShort}—${Date.now().toString().slice(-10)}`;

  document.getElementById('drawerLoanId').textContent = idShort;
  document.getElementById('drawerSubId').textContent = traceId;
  document.getElementById('drawerDate').textContent = r.completed;
  const statusEl = document.getElementById('drawerStatus');
  statusEl.className = 'drawer-status completed';
  statusEl.textContent = 'Completed';

  const sourceFiles = [
    { type: 'pdf',  name: `${idShort}_appraisal.pdf`,    meta: '4.2 MB · ' + r.completed },
    { type: 'ssr',  name: `${idShort}_ssr_response.json`, meta: '186 KB · ' + r.completed },
    { type: 'xml',  name: `${idShort}_uad.xml`,           meta: '92 KB · ' + r.completed },
  ];
  const flagCount = r.score < 85 ? Math.max(1, Math.round((85 - r.score) / 4)) : 0;
  const outputFiles = [
    { type: 'qc', name: 'QC Report',         meta: 'Generated ' + r.completed.split(',')[0], flags: flagCount },
    { type: 'uw', name: 'Underwriter Packet', meta: `${idShort}_uw_packet.pdf` },
  ];

  const steps = buildSteps(loan);
  const stepsHTML = steps.map(stepHTMLDwr).join('');
  const stepsDoneCount = steps.filter(s => s.status === 'done').length;

  // Completed loans: QC Report at top → Pipeline State → Input Report at bottom.
  let body = `
    <section class="output-section">
      <div class="drawer-section-title">QC Report <span class="drawer-section-meta">${outputFiles.length} files</span></div>
      <div class="file-grid cols-2">${outputFiles.map(fileCardHTML).join('')}</div>
    </section>
    <div class="pipeline-card">
      <div class="pipeline-card-header">
        <span class="pipeline-card-title">Pipeline Steps</span>
        <span class="step-counter"><strong>${stepsDoneCount}</strong> / ${steps.length} completed</span>
      </div>
      <div class="pipeline-steps">${stepsHTML}</div>
    </div>
    <section>
      <div class="drawer-section-title">Input Report <span class="drawer-section-meta">${sourceFiles.length} files</span></div>
      <div class="file-grid">${sourceFiles.map(fileCardHTML).join('')}</div>
    </section>`;

  document.getElementById('drawerBody').innerHTML = body;
  document.getElementById('drawerOverlay').classList.add('is-open');
  document.getElementById('drawerPanel').classList.add('is-open');
}

function closeDrawer() {
  document.getElementById('drawerOverlay').classList.remove('is-open');
  document.getElementById('drawerPanel').classList.remove('is-open');
}

/* ── SEARCH DROPDOWN ── */
let searchActiveIndex = -1;
function getSearchMatches(q) {
  q = (q || '').trim().toLowerCase();
  if (!q) return REPORTS.slice(0, 8);
  return REPORTS.filter(r => r.id.toLowerCase().includes(q)).slice(0, 8);
}
function onSearchInput() {
  const input = document.getElementById('loanSearch');
  const results = document.getElementById('searchResults');
  const matches = getSearchMatches(input.value);
  searchActiveIndex = -1;
  if (!matches.length) {
    results.innerHTML = `<div class="search-empty">No reports match "${input.value}"</div>`;
  } else {
    results.innerHTML = matches.map((r, i) => `
      <div class="search-result-row" data-loan-id="${r.id}" data-idx="${i}" onclick="openDrawer('${r.id}')">
        <span class="search-result-id">${r.id}</span>
        <span class="search-result-status completed">completed</span>
        <span class="search-result-meta">${r.completed || ''}</span>
      </div>`).join('');
  }
  results.classList.add('is-open');
}
function onSearchKey(e) {
  const results = document.getElementById('searchResults');
  const rows = results.querySelectorAll('.search-result-row');
  if (e.key === 'Escape') { results.classList.remove('is-open'); e.target.blur(); return; }
  if (e.key === 'ArrowDown') { e.preventDefault(); searchActiveIndex = Math.min(rows.length - 1, searchActiveIndex + 1); }
  else if (e.key === 'ArrowUp') { e.preventDefault(); searchActiveIndex = Math.max(0, searchActiveIndex - 1); }
  else if (e.key === 'Enter') {
    if (searchActiveIndex >= 0 && rows[searchActiveIndex]) openDrawer(rows[searchActiveIndex].dataset.loanId);
    else if (rows[0]) openDrawer(rows[0].dataset.loanId);
    return;
  } else { return; }
  rows.forEach((r, i) => r.classList.toggle('is-active', i === searchActiveIndex));
  if (rows[searchActiveIndex]) rows[searchActiveIndex].scrollIntoView({ block: 'nearest' });
}
document.addEventListener('click', (e) => {
  const wrap = document.querySelector('.search-wrap-top');
  if (wrap && !wrap.contains(e.target)) {
    document.getElementById('searchResults').classList.remove('is-open');
  }
});

document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') closeDrawer();
  if (e.key === '/' && document.activeElement.tagName !== 'INPUT') {
    e.preventDefault();
    document.getElementById('loanSearch').focus();
  }
});
</script>
