<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QC Appraisal — Reports</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="tokens.css">

<style>
html, body { height: 100%; }
body {
  background: var(--surface-page);
  min-width: 1024px;
  display: flex; flex-direction: row;
  overflow: hidden;
  color: var(--color-neutral-900);
  font-family: var(--font-family-base);
}

/* ── SIDE NAV (shared) ── */
.sidenav {
  width: 216px; flex-shrink: 0; height: 100%;
  background: var(--color-white);
  border-right: 1px solid var(--border-color);
  display: flex; flex-direction: column;
  padding: var(--space-5) var(--space-3);
  z-index: var(--z-sticky);
  overflow: hidden;
  transition: width 220ms cubic-bezier(0.16, 1, 0.3, 1);
}
.sidenav.is-collapsed { width: 52px; }
.sidenav.is-collapsed .sidenav-header { justify-content: center; }
.sidenav.is-collapsed .sidenav-logo { display: none; }
.sidenav.is-collapsed .sidenav-collapse-btn { margin: 0; width: 26px; height: 26px; }
.sidenav.is-collapsed .sidenav-collapse-btn .toggle-icon { transform: scaleX(-1); }
.sidenav.is-collapsed .sidenav-item > span { display: none; }
.sidenav.is-collapsed .sidenav-item { justify-content: center; padding: 9px 0; }
.sidenav.is-collapsed .sidenav-footer { justify-content: center; }
.sidenav.is-collapsed .sidenav-footer > div:last-child { display: none; }

.sidenav-header {
  display: flex; align-items: center; gap: var(--space-2);
  padding: var(--space-2) var(--space-3);
  margin-bottom: var(--space-5);
}
.sidenav-collapse-btn {
  width: 22px; height: 22px; flex-shrink: 0; margin-left: auto;
  display: flex; align-items: center; justify-content: center;
  border: 1px solid var(--border-color); border-radius: var(--border-radius-sm);
  background: transparent; color: var(--color-neutral-400); cursor: pointer;
  transition: background-color var(--transition-fast), color var(--transition-fast), border-color var(--transition-fast);
}
.sidenav-collapse-btn:hover { background: var(--color-neutral-50); color: var(--color-neutral-700); border-color: var(--color-neutral-300); }
.sidenav-collapse-btn .toggle-icon { transition: transform 220ms cubic-bezier(0.16, 1, 0.3, 1); }
.sidenav-logo {
  display: flex; align-items: center; gap: var(--space-2);
  padding: var(--space-2) var(--space-3); margin-bottom: var(--space-5);
  text-decoration: none;
}
.sidenav-logo-icon {
  width: 26px; height: 26px; border-radius: var(--border-radius-md);
  background: var(--color-neutral-900);
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
}
.sidenav-logo-name { font-size: var(--font-size-md); font-weight: var(--font-weight-semibold); color: var(--color-neutral-900); }
.sidenav-section-label {
  font-size: 10px; font-weight: var(--font-weight-semibold);
  color: var(--color-neutral-400); text-transform: uppercase;
  letter-spacing: 0.07em; padding: 0 var(--space-3); margin-bottom: var(--space-2);
}
.sidenav-items { display: flex; flex-direction: column; gap: 2px; flex: 1; }
.sidenav-item {
  display: flex; align-items: center; gap: var(--space-3);
  padding: 9px var(--space-3); border-radius: var(--border-radius-md);
  font-size: var(--font-size-sm); font-weight: var(--font-weight-medium);
  color: var(--color-neutral-600); text-decoration: none;
  transition: background-color var(--transition-fast), color var(--transition-fast);
}
.sidenav-item svg { flex-shrink: 0; color: var(--color-neutral-400); transition: color var(--transition-fast); }
.sidenav-item:hover { background: var(--color-neutral-50); color: var(--color-neutral-900); }
.sidenav-item:hover svg { color: var(--color-neutral-600); }
.sidenav-item.active { background: var(--color-brand-50); color: var(--color-brand-700); font-weight: var(--font-weight-semibold); }
.sidenav-item.active svg { color: var(--color-brand-600); }
.sidenav-footer {
  display: flex; align-items: center; gap: var(--space-3);
  padding: var(--space-3); border-top: 1px solid var(--border-color); margin-top: var(--space-4);
}
.sidenav-user-avatar {
  width: 30px; height: 30px; border-radius: var(--border-radius-pill);
  background: var(--color-brand-100);
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: var(--font-weight-semibold);
  color: var(--color-brand-600); border: 1px solid var(--border-color); flex-shrink: 0;
}
.sidenav-user-name { font-size: var(--font-size-sm); font-weight: var(--font-weight-medium); color: var(--color-neutral-700); }
.sidenav-user-role { font-size: 11px; color: var(--color-neutral-400); }

/* ── PAGE ── */
.page-wrap {
  flex: 1; overflow-y: auto;
  padding: var(--space-6) var(--space-7) var(--space-8);
  display: flex; flex-direction: column; gap: var(--space-6);
  min-height: 0;
}
.page-header { display: flex; align-items: baseline; gap: var(--space-4); }
.page-title {
  font-size: var(--font-size-2xl); font-weight: var(--font-weight-bold);
  letter-spacing: -0.02em; line-height: 1.1; color: var(--color-neutral-900); margin: 0;
}
.page-count { font-size: var(--font-size-sm); font-weight: var(--font-weight-medium); color: var(--color-neutral-400); }

/* ── SUMMARY ── */
.summary-row { display: flex; gap: var(--space-3); }
.summary-chip {
  display: flex; flex-direction: column; gap: 2px;
  padding: var(--space-3) var(--space-4);
  background: var(--color-white);
  border: 1px solid var(--border-color);
  border-radius: var(--border-radius-lg); min-width: 120px;
}
.summary-chip-label { font-size: 10px; font-weight: var(--font-weight-semibold); color: var(--color-neutral-500); text-transform: uppercase; letter-spacing: 0.06em; }
.summary-chip-value { font-size: var(--font-size-2xl); font-weight: var(--font-weight-bold); letter-spacing: -0.02em; color: var(--color-neutral-900); line-height: 1; }
.summary-chip-value.success { color: var(--color-success-600); }
.summary-chip-sub { font-size: 11px; color: var(--color-neutral-500); margin-top: 2px; }

/* ── FILTER BAR ── */
.filter-bar { display: flex; align-items: center; gap: var(--space-3); }
.filter-search {
  display: flex; align-items: center; gap: 8px;
  padding: 7px var(--space-3);
  border: 1px solid var(--border-color); border-radius: var(--border-radius-md);
  background: var(--color-white); width: 260px;
  transition: border-color var(--transition-fast), box-shadow var(--transition-fast);
}
.filter-search:focus-within { border-color: var(--color-brand-400); box-shadow: 0 0 0 3px var(--color-brand-100); }
.filter-search svg { color: var(--color-neutral-400); flex-shrink: 0; }
.filter-search input { flex: 1; border: none; outline: none; background: transparent; font-size: var(--font-size-sm); font-family: var(--font-family-base); color: var(--color-neutral-900); }
.filter-search input::placeholder { color: var(--color-neutral-400); }
.filter-select {
  padding: 7px var(--space-3); border: 1px solid var(--border-color);
  border-radius: var(--border-radius-md); background: var(--color-white);
  font-size: var(--font-size-sm); font-family: var(--font-family-base);
  color: var(--color-neutral-700); cursor: pointer; appearance: none;
  padding-right: var(--space-7);
  background-image: url("data:image/svg+xml,%3Csvg width='10' height='6' viewBox='0 0 10 6' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1l4 4 4-4' stroke='%239ca3af' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E");
  background-repeat: no-repeat; background-position: right 10px center;
}
.filter-spacer { flex: 1; }
.download-btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 7px var(--space-4); border-radius: var(--border-radius-md);
  border: 1px solid var(--border-color); background: var(--color-white);
  font-size: var(--font-size-sm); font-weight: var(--font-weight-medium);
  color: var(--color-neutral-700); cursor: pointer;
  transition: background-color var(--transition-fast), border-color var(--transition-fast);
}
.download-btn:hover { background: var(--color-neutral-50); border-color: var(--color-neutral-400); }

/* ── TABLE ── */
.table-wrap {
  background: var(--color-white);
  border: 1px solid var(--border-color);
  border-radius: var(--border-radius-xl);
  overflow: hidden;
}
table { width: 100%; border-collapse: collapse; }
thead { background: var(--color-neutral-50); border-bottom: 1px solid var(--border-color); }
thead th {
  padding: var(--space-3) var(--space-4); text-align: left;
  font-size: 11px; font-weight: var(--font-weight-semibold);
  color: var(--color-neutral-500); text-transform: uppercase; letter-spacing: 0.06em;
  white-space: nowrap;
}
tbody tr {
  border-bottom: 1px solid var(--color-neutral-100);
  transition: background-color var(--transition-fast); cursor: pointer;
}
tbody tr:last-child { border-bottom: none; }
tbody tr:hover { background: var(--color-neutral-50); }
tbody td { padding: var(--space-3) var(--space-4); font-size: var(--font-size-sm); vertical-align: middle; }

.td-loan-id { font-family: var(--font-family-mono); font-size: 12px; font-weight: var(--font-weight-semibold); color: var(--color-neutral-900); white-space: nowrap; }
.td-borrower { font-weight: var(--font-weight-medium); color: var(--color-neutral-900); }
.td-address { font-size: 12px; color: var(--color-neutral-500); }
.td-date { font-size: 12px; color: var(--color-neutral-500); white-space: nowrap; }
.score-badge {
  display: inline-flex; align-items: center;
  padding: 2px 8px; border-radius: var(--border-radius-pill);
  font-size: 12px; font-weight: var(--font-weight-bold);
  font-variant-numeric: tabular-nums;
}
.score-badge.high   { background: var(--color-success-100); color: var(--color-success-700); }
.score-badge.medium { background: var(--color-warning-100); color: var(--color-warning-700); }
.score-badge.low    { background: var(--color-danger-100);  color: var(--color-danger-700); }
.decision-pill {
  display: inline-flex; align-items: center;
  padding: 2px 10px; border-radius: var(--border-radius-pill);
  font-size: 11px; font-weight: var(--font-weight-semibold); white-space: nowrap;
}
.decision-pill.approved  { background: var(--color-success-100); color: var(--color-success-700); }
.decision-pill.review    { background: var(--color-warning-100); color: var(--color-warning-700); }
.decision-pill.suspended { background: var(--color-danger-100);  color: var(--color-danger-700); }
.file-doc {
  display: inline-flex; align-items: center; gap: 5px;
  font-size: 12px; font-weight: var(--font-weight-medium);
  color: var(--color-neutral-500); text-decoration: none;
  transition: color var(--transition-fast);
  white-space: nowrap;
}
.file-doc:hover { color: var(--color-brand-600); }
.file-doc svg { flex-shrink: 0; transition: color var(--transition-fast); color: var(--color-neutral-300); }
.file-doc:hover svg { color: var(--color-brand-400); }
</style>
</head>
<body>

<!-- ── SIDE NAV ── -->

<!-- ── PAGE ── -->
<div class="page-wrap">

  <div class="page-header">
    <h1 class="page-title">Reports</h1>
    <span class="page-count" id="rptCount">20 loans</span>
  </div>

  <div class="filter-bar">
    <label class="filter-search" style="flex:1">
      <svg width="14" height="14" viewBox="0 0 16 16" fill="none">
        <circle cx="7" cy="7" r="5" stroke="currentColor" stroke-width="1.5"/>
        <path d="M11 11l3 3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
      <input type="text" placeholder="Search by loan ID or borrower…" id="searchInput" oninput="filterTable()">
    </label>
    <button class="download-btn">
      <svg width="14" height="14" viewBox="0 0 16 16" fill="none">

          <th>Loan ID</th>

          <th>Source Files</th>

        </tr>
      </thead>
      <tbody id="rptTable"></tbody>
    </table>
  </div>

</div>

<script>
const REPORTS = [

  { id:'LN-000263', borrower:'Robert Chang',      address:'310 Walnut Blvd, Seattle WA',    completed:'Apr 30, 7:32 AM', score:95, decision:'Approved'     },

  { id:'LN-000266', borrower:'Patricia Nguyen',   address:'1560 Willow Rd, Chicago IL',     completed:'Apr 30, 7:24 AM', score:62, decision:'Suspended'    },
  { id:'LN-000267', borrower:'Charles Thompson',  address:'29 Magnolia Ave, Miami FL',      completed:'Apr 30, 7:21 AM', score:90, decision:'Approved'     },
  { id:'LN-000268', borrower:'Dorothy Wilson',    address:'733 Poplar St, Minneapolis MN',  completed:'Apr 30, 7:18 AM', score:83, decision:'Needs review' },
  { id:'LN-000269', borrower:'Daniel Garcia',     address:'112 Sycamore Dr, Columbus OH',   completed:'Apr 30, 7:15 AM', score:97, decision:'Approved'     },
  { id:'LN-000270', borrower:'Barbara Lewis',     address:'88 Chestnut Ln, San Jose CA',    completed:'Apr 30, 7:11 AM', score:92, decision:'Approved'     },
  { id:'LN-000271', borrower:'Steven Robinson',   address:'2244 Beech Rd, Houston TX',      completed:'Apr 30, 7:08 AM', score:76, decision:'Needs review' },
  { id:'LN-000272', borrower:'Nancy White',       address:'630 Hickory Ave, Boston MA',     completed:'Apr 30, 7:05 AM', score:88, decision:'Approved'     },
  { id:'LN-000273', borrower:'Edward Hall',       address:'405 Redwood St, San Diego CA',   completed:'Apr 30, 7:01 AM', score:68, decision:'Suspended'    },
  { id:'LN-000274', borrower:'Sandra Young',      address:'17 Cypress Blvd, Las Vegas NV',  completed:'Apr 30, 6:58 AM', score:94, decision:'Approved'     },
  { id:'LN-000275', borrower:'George Allen',      address:'880 Fir Ct, Philadelphia PA',    completed:'Apr 30, 6:54 AM', score:82, decision:'Needs review' },
  { id:'LN-000276', borrower:'Helen Scott',       address:'321 Palm Dr, Tampa FL',          completed:'Apr 30, 6:51 AM', score:91, decision:'Approved'     },

function scoreClass(s) { return s >= 85 ? 'high' : s >= 70 ? 'medium' : 'low'; }
function decisionClass(d) { return d === 'Approved' ? 'approved' : d === 'Suspended' ? 'suspended' : 'review'; }

function renderTable(data) {
  const tbody = document.getElementById('rptTable');
  tbody.innerHTML = data.map(r => `
    <tr style="cursor:pointer;" onclick="window.location.href='loan-detail-v2.html?id=${r.id}'">
      <td class="td-loan-id">${r.id}</td>
      <td class="td-borrower">${r.borrower}</td>
      <td class="td-address">${r.address}</td>
      <td class="td-date">${r.completed}</td>
      <td><span class="score-badge ${scoreClass(r.score)}">${r.score}</span></td>
      <td>
        <a class="file-doc" href="#" onclick="event.stopPropagation();return false">
          <svg width="12" height="14" viewBox="0 0 12 14" fill="none"><path d="M1.5 0h6.086L11 2.914V12.5a1 1 0 01-1 1h-8a1 1 0 01-1-1V1a1 1 0 011-1z" fill="currentColor" fill-opacity=".06" stroke="currentColor" stroke-width="1"/><path d="M7.5 0v3h3" stroke="currentColor" stroke-width="1"/></svg>
          QC Report.pdf
        </a>
      </td>
      <td>
        <a class="file-doc" href="#" onclick="event.stopPropagation();return false">
          <svg width="12" height="14" viewBox="0 0 12 14" fill="none"><path d="M1.5 0h6.086L11 2.914V12.5a1 1 0 01-1 1h-8a1 1 0 01-1-1V1a1 1 0 011-1z" fill="currentColor" fill-opacity=".06" stroke="currentColor" stroke-width="1"/><path d="M7.5 0v3h3" stroke="currentColor" stroke-width="1"/></svg>
          UW Report.pdf
        </a>
      </td>
      <td>
        <a class="file-doc" href="#" onclick="event.stopPropagation();return false">
          <svg width="12" height="14" viewBox="0 0 12 14" fill="none"><path d="M1.5 0h6.086L11 2.914V12.5a1 1 0 01-1 1h-8a1 1 0 01-1-1V1a1 1 0 011-1z" fill="currentColor" fill-opacity=".06" stroke="currentColor" stroke-width="1"/><path d="M7.5 0v3h3" stroke="currentColor" stroke-width="1"/></svg>
          Appraisal.pdf
        </a>
      </td>
    </tr>
  `).join('');
  document.getElementById('rptCount').textContent = data.length + ' loan' + (data.length !== 1 ? 's' : '');
}

function filterTable() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  const filtered = REPORTS.filter(r =>
    !q || r.id.toLowerCase().includes(q) || r.borrower.toLowerCase().includes(q)
  );
  renderTable(filtered);
}

renderTable(REPORTS);

function toggleNav() {
  const nav = document.querySelector('.sidenav');
  nav.classList.toggle('is-collapsed');
  try { localStorage.setItem('navCollapsed', nav.classList.contains('is-collapsed')); } catch(e){}
}
(function() {
  try {
    const pref = localStorage.getItem('navCollapsed');
    const nav = document.querySelector('.sidenav');
    if (pref === 'false') nav.classList.remove('is-collapsed');
    else nav.classList.add('is-collapsed');
  } catch(e){}
})();
</script>

<!-- V1 / V2 switcher -->
