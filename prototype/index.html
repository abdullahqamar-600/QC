<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QC Appraisal — Sign in</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="tokens.css">
<link rel="stylesheet" href="components.css">
<style>
html, body { height: 100%; }
body {
  background-color: #0a1428;
  background-image:
    linear-gradient(180deg, rgba(6, 12, 24, 0.20) 0%, rgba(6, 12, 24, 0.55) 100%),
    url('bg.png');
  background-size: cover, cover;
  background-position: center, center;
  background-repeat: no-repeat, no-repeat;
  background-attachment: fixed, fixed;
  color: var(--color-neutral-900);
  font-family: var(--font-family-base);
  display: flex; align-items: center; justify-content: center;
  padding: var(--space-6);
  overflow: hidden;
  min-width: 1024px;
}

.signin-card {
  width: 100%;
  max-width: 420px;
  background: var(--color-white);
  border: 1px solid var(--border-color);
  border-radius: 14px;
  padding: var(--space-7) var(--space-7) var(--space-6);
  display: flex; flex-direction: column; gap: var(--space-5);
  box-shadow:
    0 1px 2px rgba(0, 0, 0, 0.06),
    0 8px 24px -4px rgba(0, 0, 0, 0.16),
    0 32px 64px -12px rgba(0, 0, 0, 0.22);
}

.signin-brand {
  display: flex; align-items: center; gap: var(--space-3);
}
.signin-brand-mark {
  width: 36px; height: 36px;
  border-radius: 50%;
  background: url('brand/logo.svg') center/cover no-repeat var(--color-brand-500);
  flex-shrink: 0;
}
.signin-brand-name {
  font-size: var(--font-size-md);
  font-weight: var(--font-weight-semibold);
  color: var(--color-neutral-900);
  letter-spacing: -0.005em;
}

.signin-heading {
  display: flex; flex-direction: column; gap: 4px;
}
.signin-title {
  font-size: var(--font-size-2xl);
  font-weight: var(--font-weight-bold);
  letter-spacing: -0.02em;
  line-height: 1.2;
  color: var(--color-neutral-900);
  margin: 0;
}
.signin-subtitle {
  font-size: var(--font-size-sm);
  color: var(--color-neutral-500);
  margin: 0;
}

.signin-form {
  display: flex; flex-direction: column; gap: var(--space-3);
}
.field {
  display: flex; flex-direction: column; gap: 6px;
}
.field-label {
  font-size: var(--font-size-sm);
  font-weight: var(--font-weight-medium);
  color: var(--color-neutral-700);
}
.field-input {
  padding: 10px var(--space-3);
  border: 1px solid var(--border-color);
  border-radius: var(--border-radius-md);
  background: var(--color-white);
  font-size: var(--font-size-sm);
  font-family: var(--font-family-base);
  color: var(--color-neutral-900);
  transition: border-color var(--transition-fast), box-shadow var(--transition-fast);
}
.field-input:focus {
  outline: none;
  border-color: var(--color-brand-500);
  box-shadow: 0 0 0 3px var(--color-brand-100);
}
.field-input::placeholder { color: var(--color-neutral-400); }

.signin-submit {
  margin-top: var(--space-2);
  padding: 11px var(--space-4);
  background: var(--color-brand-600);
  color: var(--color-white);
  border: 1px solid var(--color-brand-600);
  border-radius: var(--border-radius-md);
  font-family: var(--font-family-base);
  font-size: var(--font-size-sm);
  font-weight: var(--font-weight-semibold);
  cursor: pointer;
  transition: background var(--transition-fast), transform var(--transition-fast), box-shadow var(--transition-fast);
  box-shadow: 0 1px 0 rgba(255, 255, 255, 0.3) inset, 0 8px 20px rgba(220, 42, 42, 0.35);
}
.signin-submit:hover { background: var(--color-brand-500); transform: translateY(-1px); }
.signin-submit:focus-visible { outline: none; box-shadow: 0 1px 0 rgba(255, 255, 255, 0.3) inset, 0 8px 20px rgba(220, 42, 42, 0.45), 0 0 0 3px rgba(220, 42, 42, 0.18); }
.signin-submit:active { transform: translateY(0); }

.signin-foot {
  display: flex; justify-content: center; gap: 6px;
  font-size: var(--font-size-sm);
  color: var(--color-neutral-500);
}
.signin-foot-link {
  color: var(--color-neutral-400);
  font-weight: var(--font-weight-medium);
  cursor: not-allowed;
  text-decoration: none;
}
.signin-foot-link:hover { color: var(--color-neutral-500); }
</style>
</head>
<body>

<form class="signin-card" id="signinForm" onsubmit="handleSignin(event)" novalidate>

  <div class="signin-brand">
    <span class="signin-brand-mark" aria-hidden="true"></span>
    <span class="signin-brand-name">QC Appraisal</span>
  </div>

  <header class="signin-heading">
    <h1 class="signin-title">Sign in</h1>
    <p class="signin-subtitle">Welcome back. Continue to your QC observer dashboard.</p>
  </header>

  <div class="signin-form">
    <label class="field">
      <span class="field-label">Email</span>
      <input class="field-input" type="email" name="email" id="email" placeholder="you@company.com" autocomplete="email" required>
    </label>
    <label class="field">
      <span class="field-label">Password</span>
      <input class="field-input" type="password" name="password" id="password" placeholder="••••••••" autocomplete="current-password" required>
    </label>
    <button class="signin-submit" type="submit">Sign in</button>
  </div>

  <div class="signin-foot">
    <span>Don't have an account?</span>
    <span class="signin-foot-link" aria-disabled="true" title="Sign up not available in this prototype">Sign up</span>
  </div>

</form>

<script>
function handleSignin(event) {
  event.preventDefault();
  // Prototype: any non-empty values pass.
  window.location.href = 'dashboard-v1.html';
}
</script>

</body>
</html>
